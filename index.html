<!DOCTYPE html>
<html>
<head>
<title>Adrian Blackwood</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    background:#050505;
    color:white;
    font-family:Georgia,serif;
}

.hero{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:url('https://raw.githubusercontent.com/mdimrankhanalpha/Adrian-Blackwood/main/dark%20fantasy%20art.jpg') center/cover;
}

h1{
    font-size:70px;
    text-shadow:0 0 20px white;
}

.profile{
    width:220px;
    height:220px;
    border-radius:50%;
    border:5px solid silver;
    object-fit:cover;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:40px;
}

.gallery img{
    width:100%;
    border-radius:20px;
    transition:.4s;
}

.gallery img:hover{
    transform:scale(1.05);
}

.btn{
    padding:15px 30px;
    background:silver;
    color:black;
    border-radius:30px;
    text-decoration:none;
    font-weight:bold;
}
</style>
</head>

<body>

<section class="hero">

<img class="profile"
src="https://raw.githubusercontent.com/mdimrankhanalpha/Adrian-Blackwood/main/1016195103440056499.jpg">

<h1>Adrian Blackwood</h1>

<p>⚔️ The Last Knight of the Forgotten Realm ⚔️</p>

<a class="btn"
href="https://github.com/mdimrankhanalpha/Adrian-Blackwood"
target="_blank">
Visit My Realm
</a>

</section>

<div class="gallery">

<a target="_blank"
href="https://raw.githubusercontent.com/mdimrankhanalpha/Adrian-Blackwood/main/knight%20peaceful.jpg">
<img src="https://raw.githubusercontent.com/mdimrankhanalpha/Adrian-Blackwood/main/knight%20peaceful.jpg">
</a>

<a target="_blank"
href="https://raw.githubusercontent.com/mdimrankhanalpha/Adrian-Blackwood/main/download.jpg">
<img src="https://raw.githubusercontent.com/mdimrankhanalpha/Adrian-Blackwood/main/download.jpg">
</a>

<a target="_blank"
href="https://raw.githubusercontent.com/mdimrankhanalpha/Adrian-Blackwood/main/download%20(1).jpg">
<img src="https://raw.githubusercontent.com/mdimrankhanalpha/Adrian-Blackwood/main/download%20(1).jpg">
</a>

</html>
